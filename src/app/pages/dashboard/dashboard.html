<div class="dashboard-content">
  <h2 class="page-title">Dashboard Overview</h2>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon blue"><i class="bi bi-currency-dollar"></i></div>
      <div class="stat-info">
        <span class="label">Total Revenue</span>
        <h3 class="value">$128,430</h3>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-icon green"><i class="bi bi-cart-check"></i></div>
      <div class="stat-info">
        <span class="label">Total Orders</span>
        <h3 class="value">1,240</h3>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-icon orange"><i class="bi bi-people"></i></div>
      <div class="stat-info">
        <span class="label">Total Customers</span>
        <h3 class="value">45,210</h3>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-icon purple"><i class="bi bi-graph-up"></i></div>
      <div class="stat-info">
        <span class="label">Growth</span>
        <h3 class="value">+12.5%</h3>
      </div>
    </div>
  </div>

  <div class="charts-section">
    <div class="chart-container">
      <h4 class="chart-title">Sales by Category</h4>
      <div class="canvas-wrapper">
        <canvas #pieChart></canvas>
      </div>
    </div>

    <div class="chart-container">
      <h4 class="chart-title">Weekly Revenue</h4>
      <div class="canvas-wrapper">
        <canvas #barChart></canvas>
      </div>
    </div>
  </div>
</div>
