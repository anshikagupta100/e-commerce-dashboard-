<h2 mat-dialog-title>Create New User</h2>

<mat-dialog-content>
  <form [formGroup]="userForm" class="user-form">
    
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Full Name</mat-label>
      <input matInput formControlName="name" placeholder="Ex. Jane Doe">
      <mat-error *ngIf="userForm.get('name')?.hasError('required')">Name is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email Address</mat-label>
      <input matInput formControlName="email" type="email" placeholder="jane@example.com">
      <mat-error *ngIf="userForm.get('email')?.hasError('email')">Enter a valid email</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>User Role</mat-label>
      <mat-select formControlName="role">
        <mat-option value="Admin">Admin</mat-option>
        <mat-option value="Editor">Editor</mat-option>
        <mat-option value="Viewer">Viewer</mat-option>
      </mat-select>
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="close()">Cancel</button>
  <button mat-raised-button color="primary" [disabled]="userForm.invalid" (click)="onSubmit()">
    Add User
  </button>
</mat-dialog-actions>
