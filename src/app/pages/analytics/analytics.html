<div class="analytics-container">
  <div class="page-header">
    <div>
      <h1>Analytics</h1>
      <p class="subtitle">Monitor your store performance and sales trends</p>
    </div>
    <button mat-stroked-button color="primary">
      <i class="bi bi-download"></i> Download Report
    </button>
  </div>

  <div class="stats-grid">
    <mat-card *ngFor="let stat of stats" class="stat-card">
      <mat-card-content>
        <div class="stat-header">
          <span class="stat-label">{{stat.label}}</span>
          <i class="bi {{stat.icon}}" [style.color]="stat.color"></i>
        </div>
        <div class="stat-value">{{stat.value}}</div>
        <div class="stat-trend">{{stat.trend}} from last month</div>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="charts-grid">
    <mat-card class="chart-card main-chart">
      <mat-card-header>
        <mat-card-title>Revenue Overview</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="canvas-container">
          <canvas #salesChart></canvas>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card class="chart-card">
      <mat-card-header>
        <mat-card-title>Recent Activity</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="activity-list">
          <div class="activity-item">
            <i class="bi bi-circle-fill text-primary"></i>
            <span>New order #4521 received</span>
            <small>2 mins ago</small>
          </div>
          <div class="activity-item">
            <i class="bi bi-circle-fill text-success"></i>
            <span>Payment processed successfully</span>
            <small>15 mins ago</small>
          </div>
          <div class="activity-item">
            <i class="bi bi-circle-fill text-warning"></i>
            <span>Low stock alert: Wireless Mouse</span>
            <small>1 hour ago</small>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
